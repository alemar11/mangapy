name: Python package

on:
  schedule:
    - cron: "0 23 */2 * *"
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  offline-tests:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Check lockfile
        run: uv lock --check
      - name: Run offline tests
        run: >
          uv run --locked pytest -q
          tests/test_cli.py
          tests/test_providers.py
          tests/test_download_manager.py
          tests/test_chapter_archiver.py
          tests/test_thread_safety.py
          tests/test_fanfox_search.py
          tests/test_fanfox_packed_js.py
          tests/test_sort_key.py

  live-provider-tests:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Check lockfile
        run: uv lock --check
      - name: Run live provider tests
        run: uv run --locked pytest -q tests/test_fanfox.py tests/test_mangadex.py
